# =============================================================================
# PHASE 3 — BACKEND-ONLY SMOKE TEST · UNIFIED MULTI-CONTAINER STACK
# Member 3 (Lathika — AI/ML Knowledge Engineer) · MANDATORY INTEGRATION GATE
# -----------------------------------------------------------------------------
# This is the single source of truth for the Phase 3 joint integration stack.
# It wires the three team members onto ONE shared bridge network ("iob-net")
# so that container-to-container DNS name resolution works and the classic
# `localhost` container-isolation trap is eliminated.
#
#   Member 1 (Core DB/API)  -> postgres        (iob-postgres)
#   Member 2 (Gateway)      -> gateway         (iob-gateway)      host :8000
#   Member 3 (AI/ML)        -> brain_intelligence (brain_intelligence) host :8002
#   Shared infra            -> neo4j, qdrant
#
# Internal DNS contract (this is the whole point of Phase 3):
#   gateway  calls AI at  -> http://brain_intelligence:8000   (NOT localhost)
#   AI       calls neo4j at-> bolt://neo4j:7687               (NOT localhost)
#   AI       calls qdrant at-> http://qdrant:6333             (NOT localhost)
#   gateway  calls pg at   -> postgresql://...@postgres:5432  (NOT localhost)
#
# Usage (from repo root, the folder that contains the root Dockerfile):
#   cp .env.phase3.example .env.phase3        # then edit secrets
#   docker compose -f docker-compose.phase3.yml --env-file .env.phase3 up --build -d
#   docker compose -f docker-compose.phase3.yml ps
#   docker compose -f docker-compose.phase3.yml logs -f brain_intelligence gateway
# =============================================================================
version: "3.9"

networks:
  iob-net:
    name: iob-net
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

services:
  # ===========================================================================
  # Member 1 — Core DB (PostgreSQL). Owns auth/users/assets/alerts persistence.
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: iob-postgres
    networks: [iob-net]
    # NOTE: the service name "postgres" IS the DNS alias on iob-net.
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: iob_user
      POSTGRES_PASSWORD: iob_password_2026
      POSTGRES_DB: iob_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # If you have the schema seed, mount it; otherwise the empty DB is fine
      # for the Phase 3 connectivity proof.
      # - ./iob-integration/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iob_user -d iob_platform"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # ===========================================================================
  # Shared infra — Neo4j (GraphRAG / Ontology). HARD dependency for graph paths.
  # ===========================================================================
  neo4j:
    image: neo4j:5.24-community
    container_name: iob-neo4j
    networks: [iob-net]
    ports:
      - "7474:7474"   # HTTP Browser / Neo4j Browser UI
      - "7687:7687"   # Bolt binary protocol
    environment:
      NEO4J_AUTH: neo4j/changeme_neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    restart: unless-stopped

  # ===========================================================================
  # Shared infra — Qdrant (Vector store). 768d all-mpnet-base-v2 / Cosine.
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: iob-qdrant
    networks: [iob-net]
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # ===========================================================================
  # Member 3 — brain_intelligence (AI/ML microservice).
  # INTERNAL-ONLY. Uvicorn on container port 8000. Exposed on host :8002 so it
  # never collides with the gateway's host :8000. The gateway reaches it on the
  # internal network via its service DNS name -> http://brain_intelligence:8000
  # ===========================================================================
  brain_intelligence:
    build:
      context: .
      dockerfile: Dockerfile
    image: brain_intelligence:phase3
    container_name: brain_intelligence
    networks: [iob-net]
    ports:
      - "8002:8000"   # host 8002 -> container 8000 (gateway owns host 8000)
    env_file:
      - .env
    environment:
      # --- Networking: point at the SHARED network DNS names, never localhost ---
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme_neo4j_password
      QDRANT_URL: http://qdrant:6333
      PLATFORM_GATEWAY_BASE_URL: http://gateway:8000
      # --- Phase 3 smoke mode ---
      APP_ENV: development        # dev bypass so gateway relay clears the internal guard
      DEBUG: "true"
      LOG_LEVEL: INFO
      # --- Embedding lock (must match Phase 1) ---
      EMBEDDING_MODEL_NAME: sentence-transformers/all-mpnet-base-v2
      QDRANT_VECTOR_SIZE: "768"
      # --- Deterministic, key-free synthesis for the smoke test ---
      LLM_PROVIDER: mock
      PDM_INFERENCE_FALLBACK_MODE: heuristic
      # --- Service token the gateway forwards to clear the internal-only guard ---
      SERVICE_API_KEY: ${SERVICE_API_KEY:-changeme_internal_service_key}
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  # ===========================================================================
  # Member 2 — Gateway (transparent REST relay + auth + persistence facade).
  # Proxies /api/v1/* to the AI service. Phase 3 demands BYTE-IDENTICAL relay,
  # i.e. the gateway must NOT warp, drop, strip, or re-order any AI payload.
  # ===========================================================================
  gateway:
    build:
      context: ./iob-integration
      dockerfile: gateway_app/Dockerfile.phase3
    image: iob-gateway:phase3
    container_name: iob-gateway
    networks: [iob-net]
    ports:
      - "8000:8000"
    environment:
      # --- THE networking fix: container DNS name, not localhost ---
      AI_SERVICE_URL: http://brain_intelligence:8000
      DATABASE_URL: postgresql://iob_user:iob_password_2026@postgres:5432/iob_platform
      JWT_SECRET_KEY: changeme_super_secret_key
      SERVICE_API_KEY: ${SERVICE_API_KEY:-changeme_internal_service_key}
      # Force transparent mode for the Phase 3 byte-identical gate:
      AI_FALLBACK: "false"
      AI_STRICT_DEGRADE: "false"
      PHASE3_TRANSPARENT_RELAY: "true"
    depends_on:
      postgres:
        condition: service_healthy
      brain_intelligence:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    restart: unless-stopped
