version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: iob-postgres
    environment:
      POSTGRES_USER: iob_user
      POSTGRES_PASSWORD: iob_password_2026
      POSTGRES_DB: iob_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iob_user -d iob_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5.24-community
    container_name: iob-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/changeme_neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: iob-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-platform:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: iob-ai-platform
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8002:8000"
    env_file:
      - ../.env.example
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: changeme_neo4j_password
      QDRANT_URL: http://qdrant:6333
      # Phase 7 production validation: provider must be supplied as a live vendor.
      # Secrets are injected from the operator shell/.env and are never committed.
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBEDDING_DEVICE: cpu
    volumes:
      - ../artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: gateway_app/Dockerfile
    container_name: iob-gateway
    depends_on:
      ai-platform:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      AI_SERVICE_URL: http://ai-platform:8000
      DATABASE_URL: postgresql://iob_user:iob_password_2026@postgres:5432/iob_platform
      JWT_SECRET_KEY: changeme_super_secret_key
      AI_FALLBACK: ${AI_FALLBACK:-false}
      AI_STRICT_DEGRADE: ${AI_STRICT_DEGRADE:-true}
    command: >
      uvicorn gateway_app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./gateway_app:/app/gateway_app
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  telemetry-ws:
    build:
      context: .
      dockerfile: gateway_app/Dockerfile
    container_name: iob-telemetry-ws
    depends_on:
      - gateway
    ports:
      - "8001:8001"
    environment:
      WS_PORT: 8001
    command: >
      uvicorn gateway_app.ws_server:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./gateway_app:/app/gateway_app
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  telemetry-simulator:
    image: python:3.11-slim
    container_name: telemetry-simulator
    depends_on:
      - telemetry-ws
    volumes:
      - ./scripts/telemetry_simulator.py:/app/sim.py
    command: >
      sh -c "pip install websockets requests && python /app/sim.py"
    environment:
      WS_URL: ws://telemetry-ws:8001/stream?token=simulator_token_12345
    # This container can be stopped live with: docker compose stop telemetry-simulator
    # The WS server will then emit degraded state, which Phase 5 orchestrator validates

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
